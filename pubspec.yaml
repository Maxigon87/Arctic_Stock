  google_fonts: ^8.1.0
  confetti: ^0.8.0
  url_launcher: ^6.3.2
  mobile_scanner: ^7.2.0
  firebase_storage: ^13.0.0
  image_picker: ^1.1.2
  connectivity_plus: ^7.2.0

