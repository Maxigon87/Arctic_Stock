# Versionado del proyecto
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  sqflite_common_ffi: ^2.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
